<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em cartaz no Brasil — {{ hub.nome or 'Cinema Perto de Mim' }}</title>
<meta name="description" content="Veja os filmes em cartaz nos cinemas do Brasil agora, com sinopse, nota e onde assistir depois.">
<link rel="canonical" href="https://{{ request.host }}/em-cartaz/">
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #0d0d0f; color: #eee; }
  header { padding: 1.25rem; }
  h1 { font-size: 1.4rem; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; padding: 0 1.25rem; }
  .card { text-decoration: none; color: inherit; }
  .card img { width: 100%; border-radius: 8px; aspect-ratio: 2/3; object-fit: cover; }
  .card p { font-size: .85rem; margin: .4rem 0 0; line-height: 1.3; }
  .paginacao { display: flex; justify-content: center; gap: 1rem; padding: 1.5rem; }
  .paginacao a { color: #eee; text-decoration: none; border: 1px solid #444; padding: .4rem .9rem; border-radius: 6px; }
  .creditos-tmdb { text-align: center; }
</style>
</head>
<body>

<header>
  <h1>Em cartaz no Brasil</h1>
</header>

<div class="grid">
  {% for f in filmes %}
    <a class="card" href="/filme/{{ f.id }}/">
      {% if f.poster_url %}
        <img src="{{ f.poster_url }}" alt="Pôster de {{ f.title }}" loading="lazy">
      {% endif %}
      <p>{{ f.title }}</p>
    </a>
  {% endfor %}
</div>

<div class="paginacao">
  {% if page > 1 %}
    <a href="/em-cartaz/?page={{ page - 1 }}">← Anterior</a>
  {% endif %}
  {% if page < total_pages %}
    <a href="/em-cartaz/?page={{ page + 1 }}">Próxima →</a>
  {% endif %}
</div>

{% include "cinema/_creditos.html" %}

</body>
</html>
