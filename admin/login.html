<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Leanttro Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f1;
  --surface: #ffffff;
  --border: #e2ddd6;
  --border2: #d0cbc2;
  --text: #1a1816;
  --text2: #6b655d;
  --text3: #9e9890;
  --accent: #7943e2;
  --accent-light: #ede8fb;
  --accent-dark: #5c2ec2;
  --red: #c0392b;
  --red-light: #fcecea;
  --font: 'DM Sans', sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.07);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* fundo sutil com grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.5;
  pointer-events: none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 400px;
  padding: 40px;
  position: relative;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}

.logo-mark {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.logo-text span {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--text3);
}

h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13.5px;
  color: var(--text3);
  margin-bottom: 28px;
}

.erro {
  background: var(--red-light);
  border: 1px solid #f5c6c2;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.erro svg { width: 15px; height: 15px; flex-shrink: 0; }

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 16px;
}

.field label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
}

.field input {
  padding: 10px 14px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(121,67,226,0.12);
}
.field input::placeholder { color: var(--text3); }

.btn-submit {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: -0.1px;
}
.btn-submit:hover { background: var(--accent-dark); }
.btn-submit:active { transform: scale(0.99); }

.footer-note {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  margin-top: 24px;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">L</div>
    <div class="logo-text">
      Leanttro Hub
      <span>Painel administrativo</span>
    </div>
  </div>

  <h1>Entrar</h1>
  <p class="subtitle">Acesse com seu e-mail e senha.</p>

  {% if erro %}
  <div class="erro">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ erro }}
  </div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
    </div>
    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">Entrar no painel</button>
  </form>

  <p class="footer-note">Leanttro Hub © {{ 2026 }}</p>
</div>

</body>
</html>
